name: Apply auth consistency patch

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  patch:
    if: github.event.issue.title == '[operator] apply auth consistency patch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: automation/auth-consistency
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply exact auth replacements
        run: python3 .github/scripts/apply-auth-consistency.py

      - name: Validate worker
        run: |
          pnpm --filter ./apps/worker run typecheck
          pnpm --filter ./apps/worker run test

      - name: Commit validated patch and remove one-shot automation
        run: |
          git config user.name "sovereign-auth-bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/apply-auth-consistency.yml .github/scripts/apply-auth-consistency.py .github/auth-consistency-trigger
          git add apps/worker/src/auth.ts apps/worker/tests/auth-cookies.test.ts
          git commit -m "Unify auth cookies roles and entitlements [auth-consistency-bot]"
          git push origin HEAD:automation/auth-consistency

      - name: Close trigger issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Validated auth patch applied to automation/auth-consistency."
