name: Apply auth consistency patch

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'automation/auth-consistency'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Apply exact auth replacements
        run: python3 .github/scripts/apply-auth-consistency.py

      - name: Validate worker
        run: |
          pnpm --filter ./apps/worker run typecheck
          pnpm --filter ./apps/worker run test

      - name: Commit validated patch and remove one-shot automation
        run: |
          git config user.name "sovereign-auth-bot"
          git config user.email "actions@users.noreply.github.com"
          git rm .github/workflows/apply-auth-consistency.yml .github/scripts/apply-auth-consistency.py
          git add apps/worker/src/auth.ts apps/worker/tests/auth-cookies.test.ts
          git commit -m "Unify auth cookies roles and entitlements [auth-consistency-bot]"
          git push origin HEAD:automation/auth-consistency
