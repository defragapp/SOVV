name: Deploy sovereign-os-api

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/core/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-sovereign-os-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-sovereign-os-api-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan for committed secrets
        run: node scripts/secret-scan.js

      - name: Typecheck worker
        run: pnpm --filter ./apps/worker run typecheck

      - name: Run worker tests
        run: pnpm --filter ./apps/worker run test

      - name: Deploy sovereign-os-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/worker
          command: deploy
