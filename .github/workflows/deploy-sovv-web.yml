name: Deploy SOVV Web

on:
  workflow_dispatch:
    inputs:
      confirm_target:
        description: Type sovv-web to confirm the production web target.
        required: true
        default: sovv-web

permissions:
  contents: read

concurrency:
  group: deploy-sovv-web
  cancel-in-progress: false

jobs:
  deploy-web:
    name: Deploy web to Cloudflare
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm_target == 'sovv-web' }}
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify repository health
        run: pnpm run verify

      - name: Build OpenNext worker bundle
        run: pnpm --filter web build:worker

      - name: Wrangler dry-run
        working-directory: apps/web
        run: pnpm exec wrangler deploy --dry-run --env production --config wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CI: true

      - name: Deploy sovv-web
        working-directory: apps/web
        run: pnpm exec wrangler deploy --env production --config wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CI: true
