name: Deploy production broker

on:
  push:
    branches:
      - main
    paths:
      - apps/sovereign-gpt/broker-worker/**
      - apps/sovereign-gpt/actions/**
      - pnpm-lock.yaml
      - .github/workflows/deploy-production-broker.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run the production broker deployment
        required: true

permissions:
  contents: read

concurrency:
  group: production-broker-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify sovereign broker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan for committed secrets
        run: node scripts/secret-scan.js

      - name: Check broker modules
        run: |
          node --check apps/sovereign-gpt/broker-worker/src/index-v4.js
          node --check apps/sovereign-gpt/broker-worker/src/repo-patch-runtime.js

      - name: Run broker patch tests
        run: pnpm exec vitest run apps/sovereign-gpt/broker-worker/src/repo-patch-runtime.test.js

      - name: Validate broker configuration
        run: pnpm exec wrangler deploy --dry-run --config apps/sovereign-gpt/broker-worker/wrangler.toml

  deploy:
    name: Deploy sovereign-broker
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy sovereign-broker
        run: pnpm exec wrangler deploy --config apps/sovereign-gpt/broker-worker/wrangler.toml

      - name: Verify broker health
        run: |
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /tmp/broker-health.json -w "%{http_code}" --max-time 15 "https://sovereign-broker.defrag.app/health" || true)
            echo "Broker health attempt $attempt: $STATUS"
            if [ "$STATUS" = "200" ]; then
              cat /tmp/broker-health.json
              exit 0
            fi
            sleep 5
          done
          cat /tmp/broker-health.json 2>/dev/null || true
          exit 1

      - name: Verify repository routes require authentication
        run: |
          STATUS=$(curl -sS -o /tmp/broker-auth.json -w "%{http_code}" --max-time 15 "https://sovereign-broker.defrag.app/repo/diff/not-found" || true)
          echo "Unauthenticated repository route status: $STATUS"
          cat /tmp/broker-auth.json 2>/dev/null || true
          if [ "$STATUS" != "401" ]; then
            exit 1
          fi
