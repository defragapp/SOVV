name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify repository health
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Secret scan
        run: node scripts/secret-scan.js

      - name: Worker tests
        run: pnpm --filter @sovereign/worker test

      - name: Worker typecheck
        run: pnpm --filter @sovereign/worker typecheck

      - name: Worker AI typecheck
        run: pnpm --filter @sovereign/worker-ai typecheck

      - name: Worker session typecheck
        run: pnpm --filter @sovereign/worker-session typecheck

      - name: Web lint
        run: pnpm --filter web lint

      - name: Web build
        run: pnpm --filter web build
