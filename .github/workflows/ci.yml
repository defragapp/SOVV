name: Repository health

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: repo-health-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned pnpm
        run: npm install --global pnpm@9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository health checks
        run: pnpm check
