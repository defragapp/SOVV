name: Sync to R2

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wrangler
        run: npm install -g wrangler@latest

      - name: Sync repo to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          echo "Syncing repo files to R2 bucket sovv-codebase..."
          find . -type f \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.wrangler/*' \
            -not -name '*.sqlite' \
            -not -name '*.sqlite-shm' \
            -not -name '*.sqlite-wal' \
            -not -name 'package-lock.json' \
            | while read -r file; do
              key="SOVV/${file#./}"
              wrangler r2 object put "sovv-codebase/${key}" --file="${file}" --content-type="text/plain" 2>/dev/null || true
            done
          echo "Sync complete."
