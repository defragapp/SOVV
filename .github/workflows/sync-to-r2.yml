name: Sync to R2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload to R2
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          command: |
            find . -type f -not -path './.git/*' -exec wrangler r2 object put sovv-codebase/SOVV/{} --file={} \;
