name: Deploy sovereign broker

on:
  push:
    branches:
      - main
    paths:
      - apps/sovereign-gpt/broker-worker/**
      - .github/workflows/deploy-sovereign-broker.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run the sovereign-broker deployment
        required: true

permissions:
  contents: read

concurrency:
  group: sovereign-broker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sovereign-broker Worker
    if: ${{ github.event_name == 'push' || inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 10
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify broker configuration
        working-directory: apps/sovereign-gpt/broker-worker
        run: |
          test -f wrangler.toml
          grep -q 'name = "sovereign-broker"' wrangler.toml
          grep -q 'binding = "LOGS"' wrangler.toml
          grep -q 'bucket_name = "sovereign-logs"' wrangler.toml

      - name: Deploy sovereign-broker
        working-directory: apps/sovereign-gpt/broker-worker
        run: npx wrangler@latest deploy

      - name: Smoke check broker health
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://sovereign-broker.defrag.app/health")
          echo "Broker health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Broker health check failed with status $STATUS"
            exit 1
          fi
          echo "Broker health check passed"
