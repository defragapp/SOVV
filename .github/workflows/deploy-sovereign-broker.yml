name: Deploy sovereign broker

on:
  push:
    branches:
      - main
    paths:
      - apps/sovereign-gpt/broker-worker/**
      - .github/workflows/deploy-sovereign-broker.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run the sovereign-broker deployment
        required: true

permissions:
  contents: read
  issues: write

concurrency:
  group: sovereign-broker-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy sovereign-broker Worker
    if: ${{ github.event_name == 'push' || inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 10
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify broker configuration
        working-directory: apps/sovereign-gpt/broker-worker
        run: |
          test -f wrangler.toml
          grep -q 'name = "sovereign-broker"' wrangler.toml
          grep -q 'main = "./src/index-v4.js"' wrangler.toml
          grep -q 'pattern = "sovereign-broker.defrag.app"' wrangler.toml
          grep -q 'binding = "LOGS"' wrangler.toml
          grep -q 'bucket_name = "sovereign-logs"' wrangler.toml

      - name: Validate broker runtime
        working-directory: apps/sovereign-gpt/broker-worker
        run: |
          node --check src/index-v4.js
          node --check src/platform-audit.js
          node --check src/repo-patch-runtime.js
          node --test src/platform-audit.test.js

      - name: Deploy sovereign-broker
        working-directory: apps/sovereign-gpt/broker-worker
        run: npx wrangler@latest deploy

      - name: Smoke check broker health
        run: |
          sleep 8
          curl --silent --show-error --max-time 15 \
            --dump-header broker-health-headers.txt \
            --output broker-health-body.txt \
            "https://sovereign-broker.defrag.app/health" || true

          echo "=== Broker health response headers ==="
          cat broker-health-headers.txt || true
          echo "=== Broker health response body ==="
          head -c 4000 broker-health-body.txt || true
          echo

          STATUS=$(awk 'toupper($1) ~ /^HTTP\// { code=$2 } END { print code }' broker-health-headers.txt)
          echo "Broker health status: ${STATUS:-missing}"

          if [ "$STATUS" != "200" ]; then
            echo "Broker health check failed with status ${STATUS:-missing}"
            exit 1
          fi

          grep -iq '^x-sovereign-broker: sovereign-dev-v3' broker-health-headers.txt
          grep -iq '^x-sovereign-entrypoint: index-v4' broker-health-headers.txt

          VERSION=$(python3 -c "import json; print(json.load(open('broker-health-body.txt')).get('broker','unknown'))")
          echo "Broker version: $VERSION"
          echo "Broker health check passed through index-v4"

      - name: Upload failed health diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sovereign-broker-health-diagnostics
          path: |
            broker-health-headers.txt
            broker-health-body.txt
          if-no-files-found: ignore

      - name: Publish failed health diagnostics
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## Sovereign broker deployment diagnostics"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Endpoint: \`https://sovereign-broker.defrag.app/health\`"
            echo
            echo "### Response headers"
            echo '```text'
            cat broker-health-headers.txt 2>/dev/null || echo "No response headers captured."
            echo '```'
            echo
            echo "### Response body"
            echo '```text'
            head -c 4000 broker-health-body.txt 2>/dev/null || echo "No response body captured."
            echo
            echo '```'
          } > broker-diagnostics.md

          gh issue create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Broker deployment failed: ${GITHUB_SHA::7}" \
            --body-file broker-diagnostics.md
