name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check worker types
        working-directory: apps/worker
        run: npm install && npx tsc --noEmit
      - name: Check web types
        working-directory: apps/web
        run: npm install && npx tsc --noEmit

  deploy-api:
    needs: typecheck
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/worker
        run: npm install
      - name: Deploy sovereign-os-api
        working-directory: apps/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-session:
    needs: typecheck
    name: Deploy Session Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/worker-session
        run: npm install
      - name: Deploy worker-session
        working-directory: apps/worker-session
        run: npx wrangler deploy --env production 2>&1 | tee /tmp/wrangler-session.txt; exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload session log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-session-debug
          path: /tmp/wrangler-session.txt
          retention-days: 1

  deploy-ai:
    needs: typecheck
    name: Deploy AI Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/worker-ai
        run: npm install
      - name: Deploy worker-ai
        working-directory: apps/worker-ai
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}


  deploy-web-app:
    needs: typecheck
    name: Deploy Web App (sovv-web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm (required by OpenNext)
        run: npm install -g pnpm
      - name: Install web deps
        working-directory: apps/web
        run: npm install
      - name: Build Next.js
        working-directory: apps/web
        run: npm run build 2>&1 | tee /tmp/nextbuild.txt; exit ${PIPESTATUS[0]}
        env:
          NODE_ENV: production
      - name: Build OpenNext (Cloudflare)
        working-directory: apps/web
        run: npx @opennextjs/cloudflare build 2>&1 | tee /tmp/opennext.txt; exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Deploy sovv-web
        working-directory: apps/web
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}s/web
        run: npx wrangler deploy --env production 2>&1 | tee /tmp/wrangler-web.txt; exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-build-logs
          path: |
            /tmp/nextbuild.txt
            /tmp/opennext.txt
            /tmp/wrangler-web.txt
          retention-days: 1

  deploy-developer:
    needs: typecheck
    name: Deploy Developer Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/developer
        run: npm install
      - name: Deploy developer agent
        working-directory: apps/developer
        run: npx wrangler deploy --env production 2>&1 | tee /tmp/wrangler-developer.txt; exit ${PIPESTATUS[0]}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload developer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-developer-debug
          path: /tmp/wrangler-developer.txt
          retention-days: 1

  deploy-sovereign-build-agent:
    needs: typecheck
    name: Deploy Sovereign Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/sovereign-build-agent
        run: npm install
      - name: Deploy sovereign-build-agent
        working-directory: apps/sovereign-build-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-sovereign-code-agent:
    needs: typecheck
    name: Deploy Sovereign Code Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install worker deps
        working-directory: apps/sovereign-code-agent
        run: npm install
      - name: Deploy sovereign-code-agent
        working-directory: apps/sovereign-code-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
