name: Deploy Cloudflare Workers

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - .release/web
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-web
  cancel-in-progress: false

jobs:
  deploy-web:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
      PRODUCTION_WEB_URLS: https://defrag.app/,https://www.defrag.app/
      CLOUDFLARE_PURGE_HOSTS: defrag.app,www.defrag.app,app.defrag.app,sovereign.defrag.app
    steps:
      - name: Check out reviewed PR commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || github.sha }}
      - name: Validate Cloudflare configuration
        shell: bash
        run: |
          missing=0
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID CLOUDFLARE_ZONE_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is missing from GitHub repository secrets"
              missing=1
            fi
          done
          exit "$missing"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/secret-scan.js
      - run: pnpm --filter ./apps/web run build
      - name: Deploy sovv-web directly
        working-directory: apps/web
        run: pnpm run deploy
      - run: pnpm --filter @workspace/scripts run purge:production-web-cache
      - run: pnpm verify:production-web
