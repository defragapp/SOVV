name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-session:
    name: Deploy Session Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-session
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-ai:
    name: Deploy AI Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-ai
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js (standalone)
        working-directory: apps/web
        run: node ../../node_modules/next/dist/bin/next build
        env:
          NEXT_PRIVATE_STANDALONE: 'true'
          NEXT_PRIVATE_OUTPUT_TRACE_ROOT: ${{ github.workspace }}
      - name: Fix monorepo standalone symlink
        working-directory: apps/web
        run: |
          STANDALONE_NESTED=".next/standalone/apps/web/.next"
          STANDALONE_TARGET=".next/standalone/.next"
          if [ -d "$STANDALONE_NESTED" ] && [ ! -e "$STANDALONE_TARGET" ]; then
            ln -s "$(pwd)/$STANDALONE_NESTED" "$STANDALONE_TARGET"
            cp ".next/standalone/apps/web/server.js" ".next/standalone/server.js" 2>/dev/null || true
            cp ".next/standalone/apps/web/package.json" ".next/standalone/package.json" 2>/dev/null || true
          fi
      - name: Build OpenNext bundle
        working-directory: apps/web
        run: node ../../node_modules/@opennextjs/cloudflare/dist/cli/index.js build --skipNextBuild
      - name: Deploy Worker via Cloudflare API
        working-directory: apps/web
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, sys, glob

          account_id = "8b1954d216d65077c6480d62583fe2c2"
          script_name = "sovv-web"
          token = os.environ["CLOUDFLARE_API_TOKEN"]
          sha = os.environ.get("GITHUB_SHA", "unknown")

          # Upload worker script + assets via multipart form
          import urllib.request, urllib.parse

          # Read worker.js
          with open(".open-next/worker.js", "rb") as f:
              worker_js = f.read()

          # Build metadata
          metadata = {
              "main_module": "worker.js",
              "compatibility_date": "2026-06-04",
              "compatibility_flags": ["nodejs_compat"],
              "bindings": [
                  {"type": "plain_text", "name": "NEXT_PUBLIC_TURNSTILE_SITE_KEY", "text": "0x4AAAAAADhGIF8-iOLIg8MU"},
                  {"type": "plain_text", "name": "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY", "text": "pk_live_51TV1FSBk78yJ8HwwY2Hx4u0YeqbBFYiooy9BEmAfL4k1GFm1lJbT8G74IfcO4Q3W2cYhBBUa2vtK3JMrFtVQCHft00951FHlMV"},
              ],
              "annotations": {"workers/message": f"Deploy {sha[:8]}"}
          }

          # Use wrangler to upload (simpler than raw multipart)
          # Write a minimal wrangler config that won't trigger opennext detection
          cwd = os.getcwd()
          wrangler_cfg = {
              "name": script_name,
              "main": f"{cwd}/.open-next/worker.js",
              "compatibility_date": "2026-06-04",
              "compatibility_flags": ["nodejs_compat"],
              "account_id": account_id,
              "workers_dev": False,
              "assets": {"directory": f"{cwd}/.open-next/assets"},
              "vars": {
                  "NEXT_PUBLIC_TURNSTILE_SITE_KEY": "0x4AAAAAADhGIF8-iOLIg8MU",
                  "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY": "pk_live_51TV1FSBk78yJ8HwwY2Hx4u0YeqbBFYiooy9BEmAfL4k1GFm1lJbT8G74IfcO4Q3W2cYhBBUa2vtK3JMrFtVQCHft00951FHlMV"
              }
          }

          with open("/tmp/wrangler-ci.json", "w") as f:
              json.dump(wrangler_cfg, f)

          # Rename open-next.config.ts temporarily to prevent wrangler auto-detection
          import shutil
          has_config = os.path.exists("open-next.config.ts")
          if has_config:
              shutil.move("open-next.config.ts", "/tmp/open-next.config.ts.bak")

          try:
              result = subprocess.run(
                  ["npx", "wrangler", "deploy", "--config", "/tmp/wrangler-ci.json"],
                  capture_output=True, text=True,
                  env={**os.environ, "CLOUDFLARE_API_TOKEN": token}
              )
              print("STDOUT:", result.stdout[-2000:] if result.stdout else "(empty)")
              print("STDERR:", result.stderr[-2000:] if result.stderr else "(empty)")
              print("Return code:", result.returncode)
              if result.returncode != 0:
                  sys.exit(result.returncode)
              print("Deploy successful!")
          finally:
              if has_config:
                  shutil.move("/tmp/open-next.config.ts.bak", "open-next.config.ts")
          PYEOF
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-developer:
    name: Deploy Developer Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/developer
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-sovereign-build-agent:
    name: Deploy Sovereign Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/sovereign-build-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-sovereign-code-agent:
    name: Deploy Sovereign Code Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/sovereign-code-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}