name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-session:
    name: Deploy Session Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-session
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-ai:
    name: Deploy AI Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-ai
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-web:
    name: Deploy Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js (standalone)
        working-directory: apps/web
        run: node ../../node_modules/next/dist/bin/next build
        env:
          NEXT_PRIVATE_STANDALONE: 'true'
          NEXT_PRIVATE_OUTPUT_TRACE_ROOT: ${{ github.workspace }}
      - name: Fix monorepo standalone symlink
        working-directory: apps/web
        run: |
          STANDALONE_NESTED=".next/standalone/apps/web/.next"
          STANDALONE_TARGET=".next/standalone/.next"
          if [ -d "$STANDALONE_NESTED" ] && [ ! -e "$STANDALONE_TARGET" ]; then
            ln -s "$(pwd)/$STANDALONE_NESTED" "$STANDALONE_TARGET"
            cp ".next/standalone/apps/web/server.js" ".next/standalone/server.js" 2>/dev/null || true
            cp ".next/standalone/apps/web/package.json" ".next/standalone/package.json" 2>/dev/null || true
          fi
      - name: Build OpenNext bundle
        working-directory: apps/web
        run: node ../../node_modules/@opennextjs/cloudflare/dist/cli/index.js build --skipNextBuild
      - name: Write wrangler deploy config
        working-directory: apps/web
        run: |
          cat > /tmp/wrangler-ci.json << 'EOF'
          {
            "name": "sovv-web",
            "main": "./.open-next/worker.js",
            "compatibility_date": "2026-06-04",
            "compatibility_flags": ["nodejs_compat"],
            "account_id": "8b1954d216d65077c6480d62583fe2c2",
            "assets": {"directory": ".open-next/assets"},
            "vars": {
              "NEXT_PUBLIC_TURNSTILE_SITE_KEY": "0x4AAAAAADhGIF8-iOLIg8MU",
              "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY": "pk_live_51TV1FSBk78yJ8HwwY2Hx4u0YeqbBFYiooy9BEmAfL4k1GFm1lJbT8G74IfcO4Q3W2cYhBBUa2vtK3JMrFtVQCHft00951FHlMV"
            }
          }
          EOF
      - name: Upload and deploy Worker
        working-directory: apps/web
        run: |
          UPLOAD_OUT=$(npx wrangler versions upload --config /tmp/wrangler-ci.json --message "Deploy ${{ github.sha }}" 2>&1)
          echo "$UPLOAD_OUT"
          VERSION_ID=$(echo "$UPLOAD_OUT" | grep -oP 'Version ID:\s*\K[a-f0-9-]+' || echo "$UPLOAD_OUT" | grep -oP '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' | tail -1)
          echo "VERSION_ID=$VERSION_ID"
          if [ -n "$VERSION_ID" ]; then
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/accounts/8b1954d216d65077c6480d62583fe2c2/workers/scripts/sovv-web/deployments" \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"versions\":[{\"version_id\":\"$VERSION_ID\",\"percentage\":100}],\"strategy\":\"percentage\",\"annotations\":{\"workers/message\":\"Deploy ${{ github.sha }}\"}}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployed version' if d.get('success') else 'Deploy failed: ' + str(d.get('errors','')))"
          else
            echo "Could not extract version ID from upload output"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-developer:
    name: Deploy Developer Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/developer
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-sovereign-build-agent:
    name: Deploy Sovereign Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/sovereign-build-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-sovereign-code-agent:
    name: Deploy Sovereign Code Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Deploy to Production
        working-directory: apps/sovereign-code-agent
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}