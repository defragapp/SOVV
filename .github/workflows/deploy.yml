name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install root deps
        run: npm ci
      - name: Install worker deps
        working-directory: apps/worker
        run: npm ci
      - name: Show wrangler version
        working-directory: apps/worker
        run: npx wrangler --version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - name: TypeScript check
        working-directory: apps/worker
        run: npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt || true
      - name: Deploy to Production
        working-directory: apps/worker
        run: npx wrangler deploy 2>&1 | tee /tmp/wrangler-output.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-deploy-log
          path: |
            /tmp/wrangler-output.txt
            /tmp/tsc-output.txt
          retention-days: 1

  deploy-session:
    name: Deploy Session Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Install worker deps
        working-directory: apps/worker-session
        run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-session
        run: npx wrangler deploy --env production 2>&1 | tee /tmp/wrangler-session.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-session-log
          path: /tmp/wrangler-session.txt
          retention-days: 1

  deploy-ai:
    name: Deploy AI Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Install worker deps
        working-directory: apps/worker-ai
        run: npm ci
      - name: Deploy to Production
        working-directory: apps/worker-ai
        run: npx wrangler deploy --env production 2>&1 | tee /tmp/wrangler-ai.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      - name: Upload deploy log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-ai-log
          path: /tmp/wrangler-ai.txt
          retention-days: 1

  deploy-web:
    name: Deploy Web App (via CF Workers Builds)
    runs-on: ubuntu-latest
    steps:
      - name: Web app deploys via Cloudflare Workers Builds dashboard
        run: echo "sovv-web deploys automatically via Cloudflare Workers Builds on push to main"

  deploy-developer:
    name: Deploy Developer Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
