name: Deploy production API

on:
  push:
    branches:
      - main
    paths:
      - apps/worker/**
      - packages/core/**
      - pnpm-lock.yaml
      - .github/workflows/deploy-production-api.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run the production API deployment
        required: true

permissions:
  contents: read

concurrency:
  group: production-api-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify API worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan for committed secrets
        run: node scripts/secret-scan.js

      - name: Typecheck worker
        run: pnpm --filter ./apps/worker run typecheck

      - name: Run worker unit tests
        run: pnpm --filter ./apps/worker run test

      - name: Run worker smoke tests
        working-directory: apps/worker
        run: pnpm exec tsx src/tests/smoke.test.ts

      - name: Validate Worker bundle
        run: pnpm exec wrangler deploy --dry-run --config apps/worker/wrangler.toml

  deploy:
    name: Deploy sovereign-os-api worker
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply pending D1 migrations
        working-directory: apps/worker
        run: pnpm exec wrangler d1 migrations apply vibesdk-db --remote

      - name: Deploy sovereign-os-api
        working-directory: apps/worker
        run: pnpm run deploy

      - name: Verify API health
        run: |
          for attempt in 1 2 3 4 5 6; do
            STATUS=$(curl -sS -o /tmp/api-health.json -w "%{http_code}" --max-time 15 "https://api.defrag.app/health" || true)
            echo "API health attempt $attempt: $STATUS"
            if [ "$STATUS" = "200" ] && grep -Eq '"(ok|status)"' /tmp/api-health.json; then
              cat /tmp/api-health.json
              break
            fi
            if [ "$attempt" = "6" ]; then
              cat /tmp/api-health.json 2>/dev/null || true
              exit 1
            fi
            sleep 5
          done

      - name: Verify anonymous auth session
        run: |
          STATUS=$(curl -sS -o /tmp/api-session.json -w "%{http_code}" --max-time 15 "https://api.defrag.app/api/auth/session" || true)
          echo "Auth session status: $STATUS"
          cat /tmp/api-session.json 2>/dev/null || true
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "401" ]; then
            exit 1
          fi
          if [ "$STATUS" = "200" ] && ! grep -Eq '"authenticated"[[:space:]]*:[[:space:]]*false' /tmp/api-session.json; then
            exit 1
          fi

      - name: Verify Stripe webhook rejects unsigned requests
        run: |
          STATUS=$(curl -sS -o /tmp/api-webhook.json -w "%{http_code}" --max-time 15 \
            -X POST "https://api.defrag.app/api/billing/webhook" \
            -H "content-type: application/json" \
            --data '{"id":"evt_unsigned","type":"customer.subscription.updated","created":0,"data":{"object":{}}}' || true)
          echo "Unsigned webhook status: $STATUS"
          cat /tmp/api-webhook.json 2>/dev/null || true
          if [ "$STATUS" != "400" ]; then
            exit 1
          fi

      - name: Verify configured Stripe prices are exposed
        run: |
          STATUS=$(curl -sS -o /tmp/api-prices.json -w "%{http_code}" --max-time 15 "https://api.defrag.app/api/stripe/prices" || true)
          echo "Stripe prices status: $STATUS"
          cat /tmp/api-prices.json 2>/dev/null || true
          if [ "$STATUS" != "200" ]; then
            exit 1
          fi
          grep -q 'price_1Te0g9Bk78yJ8Hww8fFZCqhm' /tmp/api-prices.json
          grep -q 'price_1Tq6nPBk78yJ8Hwwm0pxg4hH' /tmp/api-prices.json
