name: Deploy production API

on:
  push:
    branches:
      - main
    paths:
      - apps/worker/**
      - packages/core/**
      - pnpm-lock.yaml
      - .github/workflows/deploy-production-api.yml
  workflow_dispatch:
    inputs:
      confirm:
        description: Type DEPLOY to run the production API deployment
        required: true

permissions:
  contents: read

concurrency:
  group: production-api-deploy
  cancel-in-progress: false

jobs:
  verify:
    name: Verify API worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan for committed secrets
        run: node scripts/secret-scan.js

      - name: Typecheck worker
        run: pnpm --filter ./apps/worker run typecheck

      - name: Run worker unit tests
        run: pnpm --filter ./apps/worker run test

      - name: Run worker smoke tests
        working-directory: apps/worker
        run: pnpm exec tsx src/tests/smoke.test.ts

  deploy:
    name: Deploy sovereign-os-api worker
    needs: verify
    if: ${{ github.event_name == 'push' || inputs.confirm == 'DEPLOY' }}
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    env:
      CI: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply pending D1 migrations
        working-directory: apps/worker
        run: pnpm exec wrangler d1 migrations apply vibesdk-db --remote

      - name: Deploy sovereign-os-api
        working-directory: apps/worker
        run: pnpm exec wrangler deploy

      - name: Smoke check API health
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://api.defrag.app/health")
          echo "API health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "API health check failed with status $STATUS"
            exit 1
          fi

      - name: Smoke check auth endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "https://api.defrag.app/api/auth/session")
          echo "Auth session status: $STATUS"
          if [ "$STATUS" != "401" ] && [ "$STATUS" != "200" ]; then
            echo "Auth endpoint returned unexpected status $STATUS"
            exit 1
          fi
