name: Production web smoke

on:
  workflow_dispatch:
    inputs:
      production_web_urls:
        description: Comma-separated URLs to verify
        required: false
        default: https://defrag.app/,https://www.defrag.app/,https://app.defrag.app/,https://sovereign.defrag.app/
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  smoke:
    name: Verify live Sovereign.os web deployment
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PRODUCTION_WEB_URLS: ${{ inputs.production_web_urls || 'https://defrag.app/,https://www.defrag.app/,https://app.defrag.app/,https://sovereign.defrag.app/' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pinned pnpm
        run: npm install --global pnpm@9.15.9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify production web surface
        run: pnpm verify:production-web
