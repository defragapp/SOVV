name = "sovereign-vibe"
compatibility_date = "2026-06-21"
compatibility_flags = ["nodejs_compat"]

[site]
bucket = "./dist" # Points to the Vite build output

[build]
command = "bun run build"

[vars]
ENVIRONMENT = "production"
# VibeSDK requires OAuth for login. Add these via Cloudflare dashboard secrets, NOT here.
