<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="sc-title sc-desc">
  <title id="sc-title">Sovereign.os — Healing isn't optional. Holding the pain is.</title>
  <desc id="sc-desc">Sovereign.os. Defrag and Covenant spaces for relational intelligence and reflection.</desc>

  <!-- Background -->
  <rect width="1200" height="630" fill="#05070B"/>

  <!-- Scan lines -->
  <rect width="1200" height="630" fill="url(#sl)" opacity="0.25"/>
  <defs>
    <pattern id="sl" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="1" fill="rgba(246,245,243,0.05)"/>
    </pattern>
  </defs>

  <!-- Grid texture -->
  <defs>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(246,245,243,0.025)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Outer border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#F6F5F3" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Right panel — brand mark -->
  <!-- Outer ring -->
  <circle cx="1010" cy="315" r="160" fill="none" stroke="#F6F5F3" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="1010" cy="315" r="110" fill="none" stroke="#F6F5F3" stroke-opacity="0.06" stroke-width="1"/>
  <circle cx="1010" cy="315" r="60" fill="none" stroke="#F6F5F3" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Axes -->
  <line x1="1010" y1="155" x2="1010" y2="475" stroke="#F6F5F3" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="850" y1="315" x2="1170" y2="315" stroke="#F6F5F3" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Diagonals -->
  <line x1="897" y1="202" x2="1123" y2="428" stroke="#F6F5F3" stroke-opacity="0.05" stroke-width="1"/>
  <line x1="1123" y1="202" x2="897" y2="428" stroke="#F6F5F3" stroke-opacity="0.05" stroke-width="1"/>
  <!-- Center -->
  <circle cx="1010" cy="315" r="4" fill="#F6F5F3" fill-opacity="0.55"/>
  <circle cx="1010" cy="315" r="10" fill="none" stroke="#F6F5F3" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Fragment chars -->
  <text x="860" y="180" font-family="monospace" font-size="11" fill="#F6F5F3" fill-opacity="0.05">01·—/\|_░▒▓</text>
  <text x="860" y="460" font-family="monospace" font-size="11" fill="#F6F5F3" fill-opacity="0.05">█▄▀■□▪▫◆◇○</text>

  <!-- Left content -->
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" fill="#F6F5F3">

    <!-- Platform label -->
    <text x="72" y="108" font-size="10" letter-spacing="4" fill-opacity="0.28"
      font-family="'JetBrains Mono', 'Cascadia Code', ui-monospace, Menlo, monospace">
      SOVEREIGN.OS
    </text>

    <!-- Divider -->
    <line x1="72" y1="126" x2="440" y2="126" stroke="#F6F5F3" stroke-opacity="0.08" stroke-width="1"/>

    <!-- Headline — locked entry line -->
    <text x="72" y="230" font-size="62" font-weight="300" letter-spacing="-2" fill-opacity="0.95">Healing isn't optional.</text>
    <text x="72" y="308" font-size="62" font-weight="300" letter-spacing="-2" fill-opacity="0.38">Holding the pain is.</text>

    <!-- Support copy -->
    <text x="72" y="378" font-size="17" fill-opacity="0.38" font-weight="300">
      Work through the patterns that keep showing up.
    </text>
    <text x="72" y="402" font-size="17" fill-opacity="0.38" font-weight="300">
      Save what you learn before the moment disappears.
    </text>

    <!-- Space labels -->
    <text x="72" y="480" font-size="10" letter-spacing="3" fill-opacity="0.22"
      font-family="'JetBrains Mono', 'Cascadia Code', ui-monospace, Menlo, monospace">
      DEFRAG SPACE · COVENANT SPACE · BASELINE DESIGN · LIBRARY
    </text>

    <!-- Divider line -->
    <line x1="72" y1="510" x2="200" y2="510" stroke="#F6F5F3" stroke-opacity="0.18" stroke-width="1"/>

    <!-- URL -->
    <text x="72" y="540" font-size="12" letter-spacing="2" fill-opacity="0.20"
      font-family="'JetBrains Mono', 'Cascadia Code', ui-monospace, Menlo, monospace">
      defrag.app
    </text>
  </g>
</svg>