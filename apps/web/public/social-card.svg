<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="sc-title sc-desc">
  <title id="sc-title">Sovereign.os — Healing isn't optional. Holding the pain is.</title>
  <desc id="sc-desc">Sovereign.os. Defrag and Covenant spaces for relational intelligence and reflection.</desc>

  <rect width="1200" height="630" fill="#020202"/>

  <!-- Core glow -->
  <circle cx="950" cy="315" r="500" fill="url(#core-glow)" opacity="0.4" />
  <defs>
    <radialGradient id="core-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <pattern id="scanlines" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1" fill="#FFFFFF" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Right panel — geometric frame -->
  <rect x="650" y="-100" width="800" height="830" rx="32" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
  <rect x="700" y="-50" width="700" height="730" rx="24" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Inner core rings -->
  <circle cx="950" cy="315" r="280" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="2"/>
  <circle cx="950" cy="315" r="180" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1" stroke-dasharray="8 8"/>
  <circle cx="950" cy="315" r="100" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2"/>

  <!-- Axis intersections -->
  <line x1="950" y1="35" x2="950" y2="595" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
  <line x1="670" y1="315" x2="1230" y2="315" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Center impact -->
  <circle cx="950" cy="315" r="8" fill="#FFFFFF" fill-opacity="0.9"/>
  <circle cx="950" cy="315" r="28" fill="none" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Left content -->
  <g font-family="'SF Pro Display', Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" fill="#FDFDFD">

    <!-- Platform label -->
    <text x="80" y="120" font-size="12" letter-spacing="3" fill-opacity="0.30"
      font-family="'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace">
      SOVEREIGN.OS
    </text>

    <!-- Divider -->
    <line x1="80" y1="140" x2="480" y2="140" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>

    <!-- Headline — locked entry line -->
    <text x="80" y="260" font-size="68" font-weight="300" letter-spacing="-2" fill-opacity="0.95">Healing isn't optional.</text>
    <text x="80" y="340" font-size="68" font-weight="300" letter-spacing="-2" fill-opacity="0.45">Holding the pain is.</text>

    <!-- Support copy -->
    <text x="80" y="420" font-size="20" fill-opacity="0.45" font-weight="400">
      Work through the patterns that keep showing up.
    </text>
    <text x="80" y="450" font-size="20" fill-opacity="0.45" font-weight="400">
      Save what you learn before the moment disappears.
    </text>

    <!-- Space labels -->
    <text x="80" y="520" font-size="11" letter-spacing="2.5" fill-opacity="0.25"
      font-family="'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace">
      DEFRAG SPACE · COVENANT SPACE · BASELINE DESIGN · LIBRARY
    </text>

    <!-- Divider line -->
    <line x1="80" y1="545" x2="220" y2="545" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>

    <!-- URL -->
    <text x="80" y="575" font-size="13" letter-spacing="2" fill-opacity="0.25"
      font-family="'SF Mono', 'JetBrains Mono', ui-monospace, Menlo, monospace">
      defrag.app
    </text>
  </g>
</svg>
