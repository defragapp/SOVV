name = "sovereign-os-api"
main = "./src/index.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
# account_id removed — set CLOUDFLARE_ACCOUNT_ID in CI secrets
workers_dev = false

[[routes]]
pattern = "api.defrag.app"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "vibesdk-db"
database_id = "c8c2fd8d-5297-46fc-8594-7629c8bad74d"
migrations_dir = "migrations"

# KV namespace for session state, Baseline Design cache, usage counters, and replay protection
# Internal identifier: SOVV_DATA (KV namespace title in Cloudflare dashboard)
[[kv_namespaces]]
binding = "KV"
id = "3bd3ff5048a8468e82c574d7d66045c3"

# Primary media/templates bucket
[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "vibesdk-templates"

# Error monitoring logs bucket (created 2026-07-07)
# Logpush job id=1768279 writes workers_trace_events here
[[r2_buckets]]
binding = "LOGS"
bucket_name = "sovereign-logs"

[[queues.producers]]
binding = "QUEUE"
queue = "pattern-extraction-tasks"

[[queues.consumers]]
queue = "pattern-extraction-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "pattern-extraction-dlq"

[ai]
binding = "AI"

[[services]]
binding = "AI_SERVICE"
service = "worker-ai"

[[services]]
binding = "SESSION_SERVICE"
service = "worker-session"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "100"
simple = { limit = 15, period = 60 }


[triggers]
crons = ["0 10 * * *"]  # Daily at 10am UTC — nurture emails + session cleanup

[vars]
FREE_DAILY_LIMIT = "15"
AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
APP_URL = "https://app.defrag.app"
GATEWAY_ID = "sovereign-ai-gateway"

# ── Stripe price IDs (set as Worker secrets — listed here for reference only) ──
# STRIPE_PRICE_ID    = price_1Te0g9Bk78yJ8Hww8fFZCqhm  ($20.00/month — DEFRAG Pro)
# STRIPE_ANNUAL_PRICE_ID = price_1Tq6nPBk78yJ8Hwwm0pxg4hH ($99.00/year  — DEFRAG Pro Annual)
# Product: DEFRAG Pro (prod_UdHEFXmi3YN78U) — only active product as of 2026-07-07
# All legacy products (Pro Plan $9, Scale Plan $49) archived 2026-07-07

# send_email binding — Cloudflare Email Routing (verified destination: info@defrag.app)
# Email Routing is active on defrag.app. Destination address verified.
# Sender must be from defrag.app domain.
[[email]]
name = "EMAIL"
destination_address = "info@defrag.app"

[observability]
enabled = true