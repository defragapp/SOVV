name = "sovereign-os-api"
main = "./src/index-v2.ts"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]
# account_id removed — set CLOUDFLARE_ACCOUNT_ID in CI secrets
workers_dev = false

[[routes]]
pattern = "api.defrag.app"
custom_domain = true

[[d1_databases]]
binding = "DB"
database_name = "vibesdk-db"
database_id = "c8c2fd8d-5297-46fc-8594-7629c8bad74d"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "KV"
id = "3bd3ff5048a8468e82c574d7d66045c3"

[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "vibesdk-templates"

[[r2_buckets]]
binding = "LOGS"
bucket_name = "sovereign-logs"

[[queues.producers]]
binding = "QUEUE"
queue = "pattern-extraction-tasks"

[[queues.consumers]]
queue = "pattern-extraction-tasks"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "pattern-extraction-dlq"

[ai]
binding = "AI"

[[services]]
binding = "AI_SERVICE"
service = "worker-ai"

[[services]]
binding = "SESSION_SERVICE"
service = "worker-session"

[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "100"
simple = { limit = 200, period = 60 }

[triggers]
crons = ["0 10 * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[vars]
APP_URL = "https://defrag.app"
AI_MODEL = "openai/gpt-oss-120b"
GATEWAY_ID = "sovereign-os-gateway"
ENABLE_NEW_FLOW = "true"
ENABLE_MEMORY = "true"
FREE_DAILY_LIMIT = "15"
ENABLE_FLOW_SUGGESTION = "true"
COOKIE_DOMAIN = ".defrag.app"
STRIPE_PRICE_ID = "price_1Te0g9Bk78yJ8Hww8fFZCqhm"
STRIPE_ANNUAL_PRICE_ID = "price_1Tq6nPBk78yJ8Hwwm0pxg4hH"
BASELINE_GUIDE_PRICE_CENTS = "1000"
# STRIPE_SUPPORT_LINK_URL must be set as a Worker secret or environment variable
# only after the pay-what-you-want Stripe Payment Link is verified.
