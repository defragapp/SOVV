name = "sovereign-os-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "KV"
id = "3bd3ff5048a8468e82c574d7d66045c3"

[vars]
AI_MODEL = "@cf/meta/llama-3.1-8b-instruct-fast"
APP_URL = "https://defrag.app"
FREE_DAILY_LIMIT = "15"

[[d1_databases]]
binding = "DB"
database_name = "vibesdk-db"
database_id = "c8c2fd8d-5297-46fc-8594-7629c8bad74d"

[[r2_buckets]]
binding = "TEMPLATES"
bucket_name = "vibesdk-templates"

[observability]
enabled = true

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "1001"

  [ratelimits.simple]
  limit = 15
  period = 60

[[queues.producers]]
binding = "PATTERN_QUEUE"
queue = "pattern-extraction-tasks"

[[queues.consumers]]
queue = "pattern-extraction-tasks"
max_batch_size = 1
max_batch_timeout = 5
