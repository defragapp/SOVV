name = "worker-ai"
main = "src/index.ts"
compatibility_date = "2024-06-04"
compatibility_flags = ["nodejs_compat"]
account_id = "8b1954d216d65077c6480d62583fe2c2"
workers_dev = false

[[routes]]
pattern = "ai.defrag.app/*"
zone_id = "45a59d754ece9221fc97c92c461eb01f"

# Workers AI binding for inline model inference
[ai]
binding = "AI"


[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[build]
command = "npm install && npm run build"
