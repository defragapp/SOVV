name = "sovereign-control"
main = "./src/index.ts"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# TODO: Set workers_dev = false and add custom domain after configuring in CF dashboard:
# [[routes]]
# pattern = "operator.defrag.app"
# custom_domain = true
# Then add Cloudflare Access policy on operator.defrag.app

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
GATEWAY_ID = "sovereign-ai-gateway"
# TEAM_DOMAIN and POLICY_AUD set as secrets for Cloudflare Access JWT verification

[observability]
enabled = true

[env.development]
name = "sovereign-control-dev"
workers_dev = true
[env.development.vars]
ENVIRONMENT = "development"
