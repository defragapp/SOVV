name = "sovereign-control"
main = "./src/index.ts"
compatibility_date = "2026-06-19"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[[routes]]
pattern = "operator.defrag.app/*"
zone_id = "45a59d754ece9221fc97c92c461eb01f"

[assets]
directory = "../sovereign-control-ui/dist"
binding = "ASSETS"

[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
GATEWAY_ID = "sovereign-ai-gateway"

[[durable_objects.bindings]]
name = "AGENT_STATE"
class_name = "AgentState"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AgentState"]

[[migrations]]
tag = "v7"
deleted_classes = ["UserSecretsStore"]

[observability]
enabled = true

[env.development]
name = "sovereign-control-dev"
workers_dev = true
[env.development.vars]
ENVIRONMENT = "development"
DEV_MODE = "true"
