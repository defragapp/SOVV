name = "worker-session"
main = "src/index.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]
account_id = "8b1954d216d65077c6480d62583fe2c2"

# Route already configured in Cloudflare
route = { pattern = "session.defrag.app/*", custom_domain = false }

# Workers AI binding
[ai]
binding = "AI"

# AI Gateway binding for external model routing
[[ai.gateway]]
id = "vscode-codespace-agent"

# Durable Object
[[durable_objects.bindings]]
name = "CONFLICT_SESSION"
class_name = "ConflictSessionDO"

[[migrations]]
tag = "v1"
new_classes = ["ConflictSessionDO"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true